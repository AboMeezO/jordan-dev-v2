name: Cut and Sign Release

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Required to create the GitHub Release and upload assets
      id-token: write # Required for Cosign keyless identity federation

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # --- Setup Node.js & pnpm Environment ---
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.25.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-line: "22" # Adjust to match your preferred Node version
          cache: "pnpm"

      # --- Install Dependencies and Build Workspace ---
      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Run Monorepo Build
        run: pnpm run build

      # --- Package the Release Artifact ---
      - name: Prepare Release Artifact
        run: |
          mkdir -p dist
          # Compress the production build bundles across apps and packages
          tar -czf dist/jordan-devs-platform-${{ github.ref_name }}.tar.gz apps packages

      # --- Setup Cosign and Sign Artifact ---
      - name: Install Cosign
        uses: sigstore/cosign-installer@v3.5.0

      - name: Sign Release Artifact
        run: |
          cosign sign-blob --yes \
            --output-signature dist/jordan-devs-platform-${{ github.ref_name }}.tar.gz.sig \
            --output-certificate dist/jordan-devs-platform-${{ github.ref_name }}.tar.gz.pem \
            dist/jordan-devs-platform-${{ github.ref_name }}.tar.gz

      # --- Create Release and Upload Assets ---
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/jordan-devs-platform-${{ github.ref_name }}.tar.gz
            dist/jordan-devs-platform-${{ github.ref_name }}.tar.gz.sig
            dist/jordan-devs-platform-${{ github.ref_name }}.tar.gz.pem
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
