name: Cut and Sign Release
on:
  push:
    tags:
      - "v*"
jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: 10.25.0

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Run Monorepo Build
        run: pnpm run build

      - name: Prepare Release Artifact
        run: |
          mkdir -p dist
          tar -czf dist/jordan-devs-platform-${{ github.ref_name }}.tar.gz apps packages

      - name: Install Cosign
        uses: sigstore/cosign-installer@59acb6260d9c0ba8f4a2f9d9b48431a222b68e20 # v3.5.0

      - name: Sign Release Artifact
        run: |
          cosign sign-blob --yes \
            --bundle dist/jordan-devs-platform-${{ github.ref_name }}.tar.gz.sigstore.json \
            dist/jordan-devs-platform-${{ github.ref_name }}.tar.gz

      - name: Create GitHub Release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          files: |
            dist/jordan-devs-platform-${{ github.ref_name }}.tar.gz
            dist/jordan-devs-platform-${{ github.ref_name }}.tar.gz.sigstore.json
